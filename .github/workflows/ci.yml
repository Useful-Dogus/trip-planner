name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # build 단계는 실제 Supabase 호출 없이 모듈 import 만 평가하므로 placeholder 로 충분.
          # 컴파일 시점에 env 가 미설정이면 lib/supabase-server 의 assertEnv 가 런타임에야 던지므로 빌드 자체는 통과.
          NEXT_PUBLIC_SUPABASE_URL: 'https://example.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'

  # 운영 DB 스키마 드리프트 검출 (#225 재발 방지).
  # PR·push·수동 모두에서 동작한다. db:check 는 읽기 전용(select limit 0)이라 PR 에서 돌려도 안전.
  # secret 이 없는 환경(fork PR 등)에서는 스킵한다.
  db-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # secret 주입 여부를 step output 으로 노출 (secrets 는 if: 조건에서 직접 못 씀).
      - id: guard
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] && [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase secret 미설정 — db:check 스킵 (fork PR 등)."
          fi
      - if: steps.guard.outputs.has_secrets == 'true'
        run: npm run db:check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
