services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    image: trip-planner-api:local
    container_name: trip-planner-api
    ports:
      - "3001:3001"
    env_file: .env.local
    environment:
      API_PORT: 3001
      WEB_ORIGIN: http://localhost:3000
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    image: trip-planner-web:local
    container_name: trip-planner-web
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
