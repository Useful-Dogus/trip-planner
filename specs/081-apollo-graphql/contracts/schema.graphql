# GraphQL Schema (expected) — generated by code-first decorators
# 이 파일은 PR 리뷰어 참고용 미리보기. 실제 스키마는 build 시 schema.gql 로 자동 생성됨.

type Trip {
  id: ID!
  title: String
  startDate: String
  endDate: String
  days: [Day!]!
  lodgings: [Lodging!]!
}

type Day {
  date: String!
  items: [Item!]!
}

type Item {
  id: ID!
  name: String!
  category: String!
  date: String
  timeStart: String
  timeEnd: String
  memo: String
  budget: Int
  address: String
  lat: Float
  lng: Float
  googlePlaceId: String
  place: Place
}

type Lodging {
  id: ID!
  name: String!
  date: String
  endDate: String
  address: String
  lat: Float
  lng: Float
  memo: String
}

type Place {
  id: ID!
  name: String
  address: String
  lat: Float
  lng: Float
}

type Query {
  trip(id: ID!): Trip
}
